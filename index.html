99<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syph's Tools — Torn City Utilities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #111720;
      --border: #1e2530;
      --border2: #2a3340;
      --text: #e8edf5;
      --muted: #6b7a8d;
      --muted2: #3d4a5a;
      --accent: #3dd68c;
      --accent2: #4ecdc4;
      --accent3: #f0c040;
      --accent4: #ff6b6b;
      --accent5: #7eb8ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(61,214,140,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,214,140,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCANLINES */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── HEADER */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 64px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }

    .site-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .site-title span {
      color: var(--accent);
    }

    .site-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .header-tag {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted2);
      border: 1px solid var(--border2);
      padding: 4px 10px;
    }

    /* ── HERO CARD — FACTION DASHBOARD */
    .hero-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 40px;
      margin-bottom: 32px;
      overflow: hidden;
      animation: fadeUp 0.7s 0.1s ease both;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .hero-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* Accent glow top-left corner */
    .hero-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 200px; height: 200px;
      background: radial-gradient(ellipse at top left, rgba(61,214,140,0.12), transparent 70%);
      pointer-events: none;
    }

    /* Animated green pulse line at top */
    .hero-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanPulse 3s ease-in-out infinite;
    }

    @keyframes scanPulse {
      0%, 100% { opacity: 0.4; transform: scaleX(0.6); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .hero-badge {
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 3px 8px;
      font-weight: 700;
    }

    .hero-version {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .hero-title .hl {
      color: var(--accent);
    }

    .hero-desc {
      font-size: 10px;
      line-height: 2;
      color: var(--muted);
      max-width: 560px;
      margin-bottom: 28px;
    }

    .hero-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .feat-tag {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border: 1px solid var(--border2);
      color: var(--muted);
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }

    .hero-card:hover .feat-tag {
      border-color: rgba(61,214,140,0.3);
      color: var(--accent);
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 24px;
      border: none;
      transition: opacity 0.15s, transform 0.15s;
    }

    .hero-card:hover .hero-cta {
      opacity: 0.9;
      transform: translateX(2px);
    }

    .hero-cta-arrow {
      font-size: 14px;
      transition: transform 0.15s;
    }

    .hero-card:hover .hero-cta-arrow {
      transform: translateX(3px);
    }

    /* Big background hex decoration */
    .hero-hex {
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(120px, 20vw, 200px);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: rgba(61,214,140,0.04);
      line-height: 1;
      pointer-events: none;
      letter-spacing: -10px;
      user-select: none;
    }

    /* ── STAT ROW */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      margin-top: 28px;
      border-top: 1px solid var(--border);
    }

    .stat-cell {
      background: var(--surface);
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }

    /* ── WIP TOOLS */
    .section-label {
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 16px;
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .wip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    @media (max-width: 500px) {
      .wip-grid { grid-template-columns: 1fr; }
    }

    .wip-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s;
      overflow: hidden;
    }

    .wip-card:hover {
      border-color: var(--border2);
    }

    .wip-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--accent3);
      opacity: 0.4;
    }

    .wip-chip {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent3);
      border: 1px solid rgba(240,192,64,0.3);
      padding: 2px 7px;
      margin-bottom: 12px;
    }

    .wip-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .wip-desc {
      font-size: 9px;
      line-height: 1.9;
      color: var(--muted2);
    }

    .wip-bar {
      margin-top: 16px;
      height: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .wip-bar-fill {
      height: 100%;
      background: var(--accent3);
      opacity: 0.5;
    }

    .wip-bar-pct {
      font-size: 8px;
      color: var(--muted2);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── FOOTER */
    footer {
      margin-top: 64px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 1px;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .footer-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <div>
        <div class="site-title">⬡ <span>Syph's</span> Tools</div>
        <div class="site-sub">Torn City Utilities</div>
      </div>
      <div class="header-tag">kreinas1995.github.io</div>
    </header>

    <!-- HERO CARD — injected by JS -->
    <div id="hero-container"></div>

    <!-- WIP TOOLS -->
    <div class="section-label">— Works in progress</div>
    <div id="wip-grid" class="wip-grid"></div>

    <!-- FOOTER -->
    <footer>
      <div><span class="footer-dot"></span>Sypharius · HighVibes</div>
      <div>Torn City · Faction #50825</div>
    </footer>

  </div>

  <script>
    /**
     * Parses a version filename like "FactionBudgetv2_37_1.html" into a
     * sortable numeric tuple [major, minor, patch] so we can find the newest.
     */
    function parseVersion(filename) {
      const m = filename.match(/v(\d+)[_.](\d+)[_.](\d+)/i);
      if (!m) return [0, 0, 0];
      return [parseInt(m[1], 10), parseInt(m[2], 10), parseInt(m[3], 10)];
    }

    /**
     * Compares two version tuples; returns positive if a > b.
     */
    function cmpVersion(a, b) {
      for (let i = 0; i < 3; i++) {
        if (a[i] !== b[i]) return a[i] - b[i];
      }
      return 0;
    }

    /**
     * Given a tool's currentFolder (e.g. "FactionBudget/current/"), fetch its
     * directory listing and return the href for the newest versioned file.
     * Falls back to folder index if detection fails.
     */
    async function detectLatestVersion(tool) {
      try {
        const res = await fetch(tool.currentFolder);
        if (!res.ok) return tool.currentFolder;
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const links = Array.from(doc.querySelectorAll('a[href]'))
          .map(a => a.getAttribute('href'))
          .filter(h => h.endsWith('.html') && !h.startsWith('http'));
        if (!links.length) return tool.currentFolder;
        links.sort((a, b) => cmpVersion(parseVersion(b), parseVersion(a)));
        return tool.currentFolder + links[0].replace(/^.*\//, '');
      } catch (e) {
        return tool.currentFolder;
      }
    }

    /**
     * Extracts a human-readable version string like "v2.37.1" from a filename.
     */
    function displayVersion(href) {
      const m = href.match(/v(\d+)[_.](\d+)[_.](\d+)/i);
      if (!m) return '';
      return `v${m[1]}.${m[2]}.${m[3]}`;
    }

    /** Escapes HTML special characters. */
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderHeroCard(tool, href) {
      const ver = displayVersion(href);
      const featuresHtml = tool.features
        .map(f => `<span class="feat-tag">${esc(f)}</span>`)
        .join('\n        ');
      const statsHtml = tool.stats
        .map(s => `
        <div class="stat-cell">
          <div class="stat-label">${esc(s.label)}</div>
          <div class="stat-value"${s.color ? ` style="color:var(--${esc(s.color)});font-size:13px;"` : ''}>${esc(s.value)}</div>
        </div>`).join('');

      const titleParts = tool.name.split(' ');
      const heroTitle = titleParts.length >= 3
        ? `${esc(titleParts[0])}<br><span class="hl">${esc(titleParts[1])}</span><br>${esc(titleParts.slice(2).join(' '))}`
        : `<span class="hl">${esc(tool.name)}</span>`;

      return `
    <a href="${esc(href)}" class="hero-card" id="hero-${esc(tool.id)}">
      <div class="hero-hex">⬡⬡</div>

      <div class="hero-eyebrow">
        <span class="hero-badge">${esc(tool.badge)}</span>
        ${ver ? `<span class="hero-version">${esc(ver)}</span>` : ''}
      </div>

      <div class="hero-title">${heroTitle}</div>

      <p class="hero-desc">${esc(tool.description)}</p>

      <div class="hero-features">
        ${featuresHtml}
      </div>

      <div class="hero-cta">
        Open Dashboard <span class="hero-cta-arrow">→</span>
      </div>
      ${tool.stats.length ? `<div class="stat-row">${statsHtml}</div>` : ''}
    </a>`;
    }

    function renderWipCard(tool, href) {
      const progressHtml = tool.progress
        ? `<div class="wip-bar"><div class="wip-bar-fill" style="width:${tool.progress.pct}%"></div></div>
        <div class="wip-bar-pct">${esc(tool.progress.label)}</div>`
        : '';
      return `
      <a href="${esc(href)}" class="wip-card" id="wip-${esc(tool.id)}">
        <div class="wip-chip">${esc(tool.badge)}</div>
        <div class="wip-title">${esc(tool.name)}</div>
        <p class="wip-desc">${esc(tool.description)}</p>
        ${progressHtml}
      </a>`;
    }

    async function loadTools() {
      let config;
      try {
        const res = await fetch('config.json');
        config = await res.json();
      } catch (e) {
        console.error('Failed to load config.json', e);
        return;
      }

      const heroContainer = document.getElementById('hero-container');
      const wipGrid = document.getElementById('wip-grid');

      for (const tool of config.tools) {
        const href = await detectLatestVersion(tool);

        if (tool.heroStyle) {
          heroContainer.insertAdjacentHTML('beforeend', renderHeroCard(tool, href));
        } else {
          wipGrid.insertAdjacentHTML('beforeend', renderWipCard(tool, href));
        }
      }
    }

    loadTools();
  </script>
</body>
</html>
