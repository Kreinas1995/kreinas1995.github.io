<div>
  <h1>War Treasury Payout Calculator</h1>
  <label for="inputAmount">Enter Amount:</label>
  <input type="number" id="inputAmount" placeholder="Enter amount" />
  <button id="calculateBtn">Calculate</button>

  <h2>Payout: <span id="outputAmount">0</span></h2>
</div>

<script>
  document.getElementById('calculateBtn').addEventListener('click', function() {
    const amount = parseFloat(document.getElementById('inputAmount').value);
    const payout = calculatePayout(amount);
    document.getElementById('outputAmount').innerText = payout.toFixed(2);
  });

  function calculatePayout(amount) {
    // Assuming a calculation logic for the payout, adjust as necessary
    return amount * 0.80; // Example: 80% payout
  }
</script>
