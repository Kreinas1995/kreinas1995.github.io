name: Move old file to Old folder when new one is uploaded

on:
  push:
    paths:
      - '**/current/**'
      - '**/*v[0-9]*_[0-9]*.html'

jobs:
  move-old-files:
    runs-on: ubuntu-latest
    # ─── TOGGLE ───────────────────────────────────────────────────────────────
    # Set the Actions variable WORKFLOW_ENABLED to 'true' to enable this job.
    # Set it to anything else (or leave it unset) to disable it.
    # Go to: Settings → Secrets and variables → Actions → Variables tab
    if: vars.WORKFLOW_ENABLED == 'true' && github.actor != 'github-actions[bot]'
    # ──────────────────────────────────────────────────────────────────────────
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Move versioned files to Old/ and update current/ for every tool
        run: |
          set -euo pipefail

          while IFS= read -r tool_root; do
            [ "$tool_root" = "." ] && continue

            old_dir="$tool_root/Old"
            current_dir="$tool_root/current"

            # Skip if no current/ dir
            [ -d "$current_dir" ] || continue

            mkdir -p "$old_dir"

            # Collect all versioned HTML filenames from tool root, Old/, and current/
            tmpfile=$(mktemp)
            find "$tool_root" -maxdepth 1 -name '*v[0-9]*_[0-9]*.html' \
              -exec basename {} \; 2>/dev/null >> "$tmpfile" || true
            [ -d "$old_dir" ] && find "$old_dir" -maxdepth 1 \
              -name '*v[0-9]*_[0-9]*.html' -exec basename {} \; \
              2>/dev/null >> "$tmpfile" || true
            find "$current_dir" -maxdepth 1 \
              -name '*v[0-9]*_[0-9]*.html' -exec basename {} \; \
              2>/dev/null >> "$tmpfile" || true

            # Determine latest by numeric version tuple sort
            latest_name=$(awk '
              {
                f = $0
                if (match(f, /v([0-9]+)_([0-9]+)_([0-9]+)(_[a-zA-Z][a-zA-Z0-9]*)?\.html$/, a)) {
                  maj = a[1]+0; min = a[2]+0; pat = a[3]+0
                  mod = (a[4] != "") ? 1 : 0
                  printf "%09d %09d %09d %d %s\n", maj, min, pat, mod, f
                } else {
                  printf "%09d %09d %09d %d %s\n", 0, 0, 0, 0, f
                }
              }
            ' "$tmpfile" | sort -k1,1n -k2,2n -k3,3n -k4,4n | tail -n1 | awk '{print $NF}' || true)
            rm -f "$tmpfile"

            if [ -z "$latest_name" ]; then
              continue
            fi

            echo "[$tool_root] Latest: $latest_name"

            # Move any versioned files from the tool root (not current/ or Old/) to Old/
            mapfile -t root_files < <(find "$tool_root" -maxdepth 1 -name '*v[0-9]*_[0-9]*.html' 2>/dev/null)
            for f in "${root_files[@]+"${root_files[@]}"}"; do
              fname=$(basename "$f")
              mv -- "$f" "$old_dir/$fname"
              echo "  Moved root/$fname -> Old/"
            done

            # Move non-latest versioned files from current/ to Old/
            # Do NOT touch the latest file — leave it in current/ where it belongs
            mapfile -t cur_files < <(find "$current_dir" -maxdepth 1 -name '*v[0-9]*_[0-9]*.html' 2>/dev/null)
            for f in "${cur_files[@]+"${cur_files[@]}"}"; do
              fname=$(basename "$f")
              if [ "$fname" = "$latest_name" ]; then
                echo "  Keeping current/$fname (latest)"
                continue
              fi
              mv -- "$f" "$old_dir/$fname"
              echo "  Archived current/$fname -> Old/"
            done

            # Ensure the latest is also present in Old/ (archive copy)
            if [ ! -f "$old_dir/$latest_name" ]; then
              cp -- "$current_dir/$latest_name" "$old_dir/$latest_name"
              echo "  Archived copy: Old/$latest_name"
            fi

            # Ensure the latest is in current/ (it should already be there, but just in case)
            if [ ! -f "$current_dir/$latest_name" ]; then
              cp -- "$old_dir/$latest_name" "$current_dir/$latest_name"
              echo "  Restored: current/$latest_name"
            fi

          done < <(
            find . -type d \( -name 'Old' -o -name 'current' \) \
              -not -path './.git/*' \
              | sed -E 's,/(Old|current)(/.*)?$,,' | sort -u
          )

      - name: Move old files to Old/ for non-versioned tools
        run: |
          # Fallback for current/ folders whose files don't use versioned naming:
          # keep only the most-recently-modified non-manifest file.
          while IFS= read -r current_dir; do
            old_dir="$(dirname "$current_dir")/Old"
            mkdir -p "$old_dir"

            # Count non-manifest, non-versioned files in current/
            count=$(find "$current_dir" -maxdepth 1 -type f \
              -not -name 'manifest.json' \
              -not -name '*v[0-9]*_[0-9]*.html' | wc -l)

            if [ "$count" -gt 1 ]; then
              find "$current_dir" -maxdepth 1 -type f \
                -not -name 'manifest.json' \
                -not -name '*v[0-9]*_[0-9]*.html' \
                -printf '%T@ %p\n' \
                | sort -n \
                | head -n -1 \
                | awk '{print $2}' \
                | while IFS= read -r file; do
                    mv "$file" "$old_dir/"
                    echo "Moved: $file -> $old_dir/"
                  done
            fi
          done < <(find . -type d -name 'current' -not -path './.git/*')

      - name: Regenerate manifest.json for every tool's current/ folder
        run: |
          python3 << 'EOF'
          import json, os, re
          from collections import Counter

          def parse_version(filename):
              m = re.search(r'v(\d+)_(\d+)_(\d+)(_[a-zA-Z][a-zA-Z0-9]*)?', filename, re.I)
              if not m:
                  return (0, 0, 0, 0)
              has_mod = 1 if m.group(4) else 0
              return (int(m.group(1)), int(m.group(2)), int(m.group(3)), has_mod)

          for root, dirs, files in os.walk('.'): 
              # Skip hidden directories (e.g. .git)
              dirs[:] = [d for d in dirs if not d.startswith('.')] 
              if os.path.basename(root) != 'current':
                  continue
              old_dir = os.path.join(os.path.dirname(root), 'Old')
              all_files = []
              if os.path.isdir(old_dir):
                  all_files += [f for f in os.listdir(old_dir) if f.endswith('.html')]
              all_files += [f for f in os.listdir(root) if f.endswith('.html')]

              # Warn and deduplicate: the latest file lives in both Old/ and current/
              # after the move step, so duplicates are expected but must be removed.
              counts = Counter(all_files)
              duplicates = [f for f, c in counts.items() if c > 1]
              if duplicates:
                  print(f'WARNING [{root}]: Duplicate entries detected and removed: {duplicates}') 
              # Use dict to deduplicate while preserving insertion order, then sort
              all_files = list(dict.fromkeys(all_files))

              all_files.sort(key=parse_version) 
              if not all_files:
                  continue
              manifest = {'latest': all_files[-1], 'all': all_files} 
              out_path = os.path.join(root, 'manifest.json') 
              with open(out_path, 'w') as fh:
                  json.dump(manifest, fh, indent=2)
                  fh.write('\n')
              print(f'Updated {out_path}: latest={manifest["latest"]}, count={len(all_files)}')
              # Confirm the latest field always points to the newest version after sort
              print(f'CONFIRM [{root}]: latest field={manifest["latest"]} == newest in all={all_files[-1]}')
              assert manifest['latest'] == all_files[-1], \
                  f'ERROR [{root}]: latest field does not match newest version in all!'
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Move old file(s) to Old [auto]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}