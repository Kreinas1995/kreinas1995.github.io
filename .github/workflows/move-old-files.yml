name: Move old file to Old folder when new one is uploaded

on:
  push:
    paths:
      - '**/current/**'

jobs:
  move-old-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Move old files to Old folder for every tool
        run: |
          # Find every 'current' directory anywhere in the repo (skip .git)
          while IFS= read -r current_dir; do
            # Derive the sibling 'Old' directory
            old_dir="$(dirname "$current_dir")/Old"
            mkdir -p "$old_dir"

            # Count files (non-recursive, files only) in current
            count=$(find "$current_dir" -maxdepth 1 -type f | wc -l)

            if [ "$count" -gt 1 ]; then
              # Move all but the most recently modified file to Old
              find "$current_dir" -maxdepth 1 -type f -printf '%T@ %p\n' \
                | sort -n \
                | head -n -1 \
                | awk '{print $2}' \
                | while IFS= read -r file; do
                    mv "$file" "$old_dir/"
                    echo "Moved: $file -> $old_dir/"
                  done
            fi
          done < <(find . -type d -name 'current' -not -path './.git/*')

      - name: Regenerate manifest.json for every tool's current/ folder
        run: |
          python3 << 'EOF'
          import json, os, re

          def parse_version(filename):
              m = re.search(r'v(\d+)_(\d+)_(\d+)', filename, re.I)
              return (int(m.group(1)), int(m.group(2)), int(m.group(3))) if m else (0, 0, 0)

          for root, dirs, files in os.walk('.'):
              # Skip hidden directories (e.g. .git)
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              if os.path.basename(root) != 'current':
                  continue
              old_dir = os.path.join(os.path.dirname(root), 'Old')
              all_files = []
              if os.path.isdir(old_dir):
                  all_files += [f for f in os.listdir(old_dir) if f.endswith('.html')]
              all_files += [f for f in os.listdir(root) if f.endswith('.html')]
              all_files.sort(key=parse_version)
              if not all_files:
                  continue
              manifest = {'latest': all_files[-1], 'all': all_files}
              out_path = os.path.join(root, 'manifest.json')
              with open(out_path, 'w') as fh:
                  json.dump(manifest, fh, indent=2)
                  fh.write('\n')
              print(f'Updated {out_path}: latest={manifest["latest"]}, count={len(all_files)}')
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Move old file(s) to Old [auto]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
